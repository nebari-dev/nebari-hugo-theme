{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p style="color: var(--muted-foreground); font-size: 1.05rem; margin-bottom: 1.5rem;">{{ . }}</p>{{ end }}
    {{ .Content }}

    {{ with .Pages }}
      <ul>
        {{ range . }}
          <li><a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ with .Description }} — {{ . }}{{ end }}</li>
        {{ end }}
      </ul>
    {{ end }}
  </article>
{{ end }}
