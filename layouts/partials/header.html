<header class="site-header">
  <div class="site-header__inner">
    <a class="site-header__brand" href="{{ "/" | relURL }}">
      <img src="{{ site.Params.logo | default "https://raw.githubusercontent.com/nebari-dev/nebari-design/main/logo-mark/horizontal/standard/Nebari-Logo-Horizontal-Lockup.png" }}" alt="Nebari">
      {{ with site.Title }}
        <span class="sep">/</span>
        <span>{{ . }}</span>
      {{ end }}
    </a>

    {{ with site.Menus.main }}
      <nav class="site-header__nav">
        {{ range . }}
          <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    {{ end }}

    <div class="site-header__actions">
      <button type="button" id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">
        {{/* Sun (shown in light mode) */}}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="theme-icon--sun">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
        </svg>
        {{/* Moon (shown in dark mode) */}}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="theme-icon--moon">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      {{ with site.Params.repo }}
        <a href="{{ . }}" class="icon-btn" aria-label="GitHub repository">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      {{ end }}
    </div>
  </div>
</header>

<style>
  .theme-icon--moon { display: none; }
  .dark .theme-icon--sun { display: none; }
  .dark .theme-icon--moon { display: inline; }
</style>
