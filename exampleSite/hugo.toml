# Example site used to develop + preview the theme locally and capture
# screenshots for the README. Run `hugo server -s exampleSite` from the
# repo root, or use `make dev` / `make screenshots`.
#
# This site imports the parent directory as a Hugo Module — the `replace`
# in `module.replacements` points the import path back at `../` so the
# example always sees in-progress theme changes.

baseURL      = "https://example.org/"
languageCode = "en-US"
title        = "nebari-hugo-theme demo"
theme        = ["github.com/nebari-dev/nebari-hugo-theme"]

# Pull last-commit date for each markdown file so the "Last updated"
# stamp under page titles works.
enableGitInfo = true

defaultContentLanguage         = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    weight       = 1
  [languages.es]
    languageName = "Español"
    weight       = 2
    title        = "demo de nebari-hugo-theme"

[markup]
  [markup.highlight]
    noClasses   = false
    codeFences  = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3

# Required for client-side Fuse.js search — the home page must emit
# /index.json so search.ts can fetch and index it.
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Minimal Hugo theme for Nebari software-pack docs."
  repo        = "https://github.com/nebari-dev/nebari-hugo-theme"
  editBase    = "https://github.com/nebari-dev/nebari-hugo-theme/edit/main/exampleSite/content"

  # Versioning: rendered as a dropdown next to the search box. The
  # `current = true` entry is what's shown on the trigger.
  [[params.versions]]
    label   = "v0.2 (current)"
    url     = "/"
    current = true
  [[params.versions]]
    label = "v0.1"
    url   = "https://example.org/v0.1/"

  # Multi-tab top nav. Each tab's URL determines which pages "belong"
  # to it (RelPermalink prefix match).
  [[params.tabs]]
    name = "Demo"
    url  = "/"
  [[params.tabs]]
    name = "Components"
    url  = "/components/"

  # Sidebar tree. Items are either {label, url} (real page) or
  # {label, soon=true} (stub with "soon" badge).
  [[params.sidebar]]
    heading = "Demo pages"
    [[params.sidebar.items]]
      label = "Home"
      url   = "/"
    [[params.sidebar.items]]
      label = "Components"
      url   = "/components/"

  [[params.sidebar]]
    heading = "Future"
    [[params.sidebar.items]]
      label = "Customization"
      soon  = true
    [[params.sidebar.items]]
      label = "Edit-on-GitHub"
      soon  = true

[module]
  [module.hugoVersion]
    extended = true
    min      = "0.116.0"
  [[module.imports]]
    path = "github.com/nebari-dev/nebari-hugo-theme"
  # Local development uses the replace directive in exampleSite/go.mod
  # to point the import back at ../, so this site always sees
  # uncommitted changes to the parent theme.
